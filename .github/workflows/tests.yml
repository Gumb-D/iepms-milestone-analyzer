name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python modules
        run: >-
          python -m py_compile
          scripts/IEPMS_Milestone_Analyzer.py
          scripts/iepms_safe_runner.py
          scripts/iepms_guarded_runner.py
          scripts/guarded_analyzer.py
          scripts/mapping_guard.py
          scripts/live_fetch.py
          scripts/run_contract.py
          scripts/runtime_state.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v
